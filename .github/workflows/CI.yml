name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.11', '1.12']
    name: Julia ${{ matrix.julia-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v2
      - name: Install dependencies
        run: julia --project=. -e 'using Pkg; Pkg.add(name="DynamicQuantities", version="1.11.0"); Pkg.instantiate()'
      - name: Load package
        run: julia --project=. -e 'using Kinbiont; println("Kinbiont loaded OK")'
      - name: Run tests
        run: julia --project=. -e 'using Pkg; Pkg.test()'
